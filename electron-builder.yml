appId: ai.simplex.app
productName: Simplex AI
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - src/**/*.js
  - src/**/*.jsx
  - src/**/*.html
  - tools/**/*
  - "!node_modules/**/*"
  - node_modules/better-sqlite3/**/*
  - node_modules/tiktoken/**/*
asarUnpack:
  - node_modules/better-sqlite3
  - node_modules/tiktoken
linux:
  target:
    - target: AppImage
    - target: deb
  category: Utility
  icon: build/icon.png
win:
  target:
    - target: nsis
  icon: build/icon.png
mac:
  target:
    - target: dmg
    - target: zip
  icon: build/icon.png
  category: public.app-category.utilities
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
